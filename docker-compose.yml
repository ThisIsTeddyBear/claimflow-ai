services:
  postgres:
    image: postgres:16
    container_name: claimflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: claimflow
      POSTGRES_PASSWORD: claimflow
      POSTGRES_DB: claimflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    image: python:3.12-slim
    container_name: claimflow-api
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: sh -c "pip install -r apps/api/requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+psycopg://claimflow:claimflow@postgres:5432/claimflow
      UPLOAD_DIR: /workspace/data/uploads
      DATA_DIR: /workspace/data
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  pgdata: